name: CI/CD Discover-Doller-Task

on:
  push:
    branches:
      - main

jobs:
  build:
    name: CI – Validate Configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config

  deploy:
    name: CD – Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy on EC2 using Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e

            echo "Connected user:"
            whoami

            echo "Updating packages"
            sudo apt update -y

            echo "Checking Docker installation..."
            if ! command -v docker &> /dev/null
            then
              echo "Docker not found. Installing Docker..."
              sudo apt install -y docker.io
              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            else
              echo "Docker already installed"
            fi

            echo "Checking Docker Compose installation..."
            if ! command -v docker-compose &> /dev/null
            then
              echo "Docker Compose not found. Installing..."
              sudo apt install -y docker-compose
            else
              echo "Docker Compose already installed"
            fi

            echo "Checking project directory..."
            if [ ! -d "/home/ubuntu/Discover-Dollar-task" ]; then
              echo "Project not found. Cloning repository..."
              cd /home/ubuntu
              git clone https://github.com/mangeshmule-devops/Discover-Dollar-task.git
            fi

            echo "Going to project directory"
            cd /home/ubuntu/Discover-Dollar-task

            echo "Pulling latest code"
            sudo git pull

            echo "Deploying application"
            sudo docker-compose down || true
            sudo docker-compose up -d --build

            echo "Deployment completed successfully"
