name: CI/CD Docker Compose Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    name: CI – Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config

  deploy:
    name: CD – Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Manual SSH test and deploy
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e

            echo "Going to project directory"
            cd /home/ubuntu/Discover-Dollar-task

            echo "Pull latest code"
            git pull origin main

            echo "Rebuilding containers"
            docker compose down
            docker compose up -d --build

            echo "Deployment completed successfully"

          EOF
